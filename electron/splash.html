<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>启动画面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .splash-image {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0;
      animation: fadeIn 1s ease-in-out forwards;
    }
    
    .splash-text {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: translateY(30px);
      animation: floatUp 1s ease-out forwards 0.5s;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img class="splash-image" src="./splash-image.jpg" alt="Logo">
    <div class="splash-text">FreeTax制作</div>
  </div>
  
  <script>
    // 动画完成后通知主进程
    setTimeout(() => {
      if (window.electron) {
        window.electron.splashReady();
      }
    }, 2000);
  </script>
</body>
</html>
